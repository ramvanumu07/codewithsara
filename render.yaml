# Deploy from repo root so backend can load ../../data/curriculum.js (topics + assignments).
# With rootDir: backend, Render may not include repo-root data/ at runtime.
services:
  - type: web
    name: sara-api
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://codewithsara.netlify.app
