# Render Blueprint – Sara backend only
# Frontend is deployed on Netlify. Set all secret env vars in the Render dashboard.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sara-backend
    runtime: node
    region: oregon

    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start

    envVars:
      - key: NODE_ENV
        value: production
      # Required – set in dashboard
      - key: FRONTEND_URL
        sync: false   # Your Netlify URL, e.g. https://your-app.netlify.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      # Optional
      - key: LOG_LEVEL
        value: info
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        sync: false
