# Sara – frontend + API on Netlify (one deploy, one place for env vars)

[build]
  base    = ""
  command = "npm run install:all && npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[functions]
  # Backend must be bundled – api.js imports ../../backend/app.js
  included_files = ["backend/**"]
  # Default bundler (nft) handles dynamic imports better than esbuild

# Node 20; NODE_ENV=development so devDependencies (vite) install during build
[build.environment]
  NODE_VERSION = "20"
  NODE_ENV     = "development"

# API: send /api/* to the Node function (backend runs here)
# :splat preserves path so /api/auth/check-username/x reaches Express correctly
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# SPA: serve index.html for all other routes
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
