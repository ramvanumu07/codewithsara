# Sara – frontend + API on Netlify (one deploy, one place for env vars)

[build]
  base    = ""
  command = "npm run install:all && npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

# Use Node 20 (matches .nvmrc) so install and build are consistent
[build.environment]
  NODE_VERSION = "20"

# API: send /api/* to the Node function (backend runs here)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

# SPA: serve index.html for all other routes
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
