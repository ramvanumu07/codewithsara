# Netlify configuration – frontend (React/Vite)
# Backend API: deploy separately (e.g. Render, Railway) and set VITE_API_BASE_URL in Netlify env.

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA: serve index.html for all routes
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Optional: proxy API in development (Netlify Dev)
# [[redirects]]
#   from = "/api/*"
#   to   = "http://localhost:5000/api/:splat"
#   status = 200
#   force = true
